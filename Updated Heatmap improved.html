            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .tab-btn:hover { background-color: #30363d; }
        .tab-btn.active {

            color: #ffffff;

            padding: 10px 30px;
            background-color: #0d1117;
            font-size: 13px;
            font-weight: 600;

        .color-box { width: 14px; height: 14px; border-radius: 3px; }
        .c-green { background-color: #238636; }
        .c-orange { background-color: #d29922; }
        .c-red { background-color: #da3633; }

        #chart-container {
            width: 100%;
            height: calc(100vh - 160px);
            padding: 0 15px 15px 15px;
            box-sizing: border-box;
        }

        #main {

            background-color: #0d1117;

            { s: "Mining", n: "Tsairt Mineral", st: 2, v: 400, ar: "Мэдээлэл нээлттэй бус (ХХК)", ms: "ТОП-100 ААН", pct: "Цайрын баяжмалын үндсэн үйлдвэрлэгч" },
            { s: "Mining", n: "Badrakh Energy", st: 2, v: 300, ar: "Мэдээлэл нээлттэй бус (ХХК)", ms: "Том ААН", pct: "Уран хайгуул, олборлолтын төслийн цор ганц томоохон төлөөлөл" },
            { s: "Mining", n: "Багануур ХК", st: 2, v: 300, ar: "213.1 тэрбум төгрөг (2023 оны тайлан, ХК)", ms: "ТОП-100 ААН", pct: "Дотоодын эрчим хүчний нүүрсний ~60%-ийг дангаар хангагч" },
            { s: "Mining", n: "Шивээ Овоо ХК", st: 2, v: 200, ar: "67.5 тэрбум төгрөг (2023 оны тайлан, ХК)", ms: "ТОП-100 ААН", pct: "Дотоодын эрчим хүчний нүүрсний ~30%-ийг хангагч" },
            { s: "Mining", n: "Steppe Gold", st: 2, v: 300, ar: "Мэдээлэл хязгаарлагдмал (ХК)", ms: "Том ААН", pct: "Алт олборлолтын салбарын өсөж буй томоохон компани" },
            { s: "Mining", n: "Xanadu Mines", st: 2, v: 300, ar: "Хайгуулын шатны компани (Борлуулалтын орлогогүй, ХК)", ms: "Том ААН", pct: "Зэс, алтны хайгуулын (Хармагатай төсөл) тэргүүлэх компани" },
            { s: "Mining", n: "Монголросцветмет", st: 2, v: 400, ar: "Мэдээлэл хязгаарлагдмал (ТӨҮГ)", ms: "ТОП-100 ААН", pct: "Жонш болон төмрийн хүдэр олборлолтын голлох компани" },
            { s: "Mining", n: "Erdene Resource", st: 2, v: 300, ar: "Хайгуулын / Бүтээн байгуулалтын шат (Борлуулалтын орлогогүй, ХК)", ms: "Том ААН", pct: "Алтны хайгуул, уурхайн бүтээн байгуулалтын (Баян Хөндий төсөл) компани" }
        ];

        // Датаг салбараар нь ангилах
        const groupedData = {};
        allData.forEach(item => {
            if (!groupedData[item.s]) {
                groupedData[item.s] = [];
            }
            groupedData[item.s].push({
                name: item.n,
                value: item.v,
                annualRevenue: item.ar,
                marketShare: item.ms,
                percentage: item.pct,
                itemStyle: { color: item.st === 1 ? colorGreen : item.st === 2 ? colorRed : colorOrange }
            });
        });

        // 20 Цэсийг (Tab) автоматаар үүсгэх хэсэг
        function initTabs() {
            const tabsContainer = document.getElementById('tabs-container');
            
            // "Бүх салбар" цэс хамгийн түрүүнд
            const btnAll = document.createElement('button');
            btnAll.className = 'tab-btn active';
            btnAll.innerText = `Бүх салбар (${allData.length})`;
            btnAll.onclick = function() { switchTab('all', this); };
            tabsContainer.appendChild(btnAll);

            // Бусад 20 салбарын цэснүүд
            Object.keys(groupedData).forEach(sector => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.innerText = `${sector} (${groupedData[sector].length})`;
                btn.onclick = function() { switchTab(sector, this); };
                tabsContainer.appendChild(btn);
            });
        }

        // График зурах үйлдэл
        function updateChart(sectorKey) {
            if (!myChart) return;
            
            let currentData = [];
            let isAllSectors = false;

            if (sectorKey === 'all') {
                isAllSectors = true;
                Object.keys(groupedData).forEach(s => {
                    currentData.push({
                        name: s,
                        children: groupedData[s]
                    });
                });
            } else {
                currentData = groupedData[sectorKey];
            }

            const option = {
                tooltip: {
                    backgroundColor: '#161b22',
                    borderColor: '#30363d',
                    padding: 12,
                    textStyle: { color: '#c9d1d9' },
                    formatter: function (info) {
                        const data = info.data;
                        if (data.children) {
                            return `<div style="min-width: 150px;">
                                        <div style="font-weight:800; color:#fff; font-size: 15px; margin-bottom: 5px;">${info.name}</div>
                                        <div style="color:#8b949e; font-size: 13px;">Нийт компани: <b style="color:#58a6ff;">${data.children.length}</b></div>
                                    </div>`;
                        }

                        const annualRevenue = data.annualRevenue ?? '—';
                        const marketShare = data.marketShare ?? '—';
                        const percentage = data.percentage ?? '—';

                        return `<div style="min-width: 220px;">
                                    <div style="font-weight:800; color:#fff; font-size: 15px; margin-bottom: 8px;">${echarts.format.encodeHTML(info.name)}</div>
                                    <div style="color:#8b949e; font-size: 13px; line-height: 1.7;">
                                        <div>Annual revenue: <b style="color:#58a6ff;">${echarts.format.encodeHTML(String(annualRevenue))}</b></div>
                                        <div>Market Share: <b style="color:#58a6ff;">${echarts.format.encodeHTML(String(marketShare))}</b></div>
                                        <div>Percentage: <b style="color:#58a6ff;">${echarts.format.encodeHTML(String(percentage))}</b></div>
                                    </div>
                                </div>`;
                    }
                },
                series: [{
                    type: 'treemap',
                    width: '100%',
                    height: '100%',
                    roam: false, 
                    nodeClick: false,
                    breadcrumb: { show: false },
                    label: {
                        show: true,
                        formatter: '{b}',
                        color: '#ffffff',
                        fontSize: isAllSectors ? 11 : 14, // Бүх салбарыг харахад үсэг жижигсэж багтана
                        fontWeight: 600,
                        fontFamily: 'Inter',
                        textShadowBlur: 2,
                        textShadowColor: 'rgba(0,0,0,0.8)'
                    },
                    upperLabel: {
                        show: isAllSectors,
                        height: 30,
                        color: '#ffffff',
                        fontWeight: 'bold',
                        fontSize: 13,
                        fontFamily: 'Inter',
                        backgroundColor: '#161b22',
                        borderColor: '#30363d',
                        borderWidth: 1
                    },
                    itemStyle: {
                        borderColor: '#0d1117',
                        borderWidth: 2,
                        gapWidth: 2
                    },
                    levels: isAllSectors ? [
                        { itemStyle: { borderColor: '#30363d', borderWidth: 3, gapWidth: 3 } },
                        { itemStyle: { borderColor: '#0d1117', borderWidth: 1.5, gapWidth: 1.5 } }
                    ] : [
                        { itemStyle: { borderColor: '#0d1117', borderWidth: 2, gapWidth: 2 } }
                    ],
                    data: currentData
                }]
            };
            
            myChart.setOption(option, true);
        }

        function switchTab(sectorKey, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            updateChart(sectorKey);
        }

        document.addEventListener("DOMContentLoaded", function() {
            var chartDom = document.getElementById('main');
            if (typeof echarts === 'undefined') return;

            myChart = echarts.init(chartDom);
            
            initTabs();
            updateChart('all');
            
            window.addEventListener('resize', function() {
                if(myChart) myChart.resize();
            });
        });
    </script>
</body>
</html>
